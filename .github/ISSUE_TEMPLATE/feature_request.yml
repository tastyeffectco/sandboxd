name: Feature request
description: Suggest a capability or improvement for sandboxd.
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - sandboxd core (control plane / API / engine)
        - console (web client)
        - App Store recipe / runtime detection
        - docs
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? If it's a client concern, note whether the core already exposes what's needed via `/v1`.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
