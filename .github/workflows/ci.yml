name: ci

on:
  push:
    branches: [main, console, "release/**"]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            echo "Run: gofmt -w ."
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

  # End-to-end: build the base image + sandboxd and drive the real
  # create -> seed -> install -> serve -> wake lifecycle on Docker. Also
  # smoke-tests the image (agent CLIs + default template on PATH), so a
  # change that drops OpenCode or the react-standard template fails here.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod

      - name: build sandboxd
        run: cd control-plane && go build -o /tmp/sandboxd ./cmd/sandboxd

      - name: build base image
        run: docker build -f image/Dockerfile -t sandboxed-base:ci .

      - name: e2e
        env:
          SANDBOXD_IMAGE: sandboxed-base:ci
          SANDBOXD_BIN: /tmp/sandboxd
        run: bash scripts/e2e.sh

  # Console is a /v1 client: typecheck, unit-test, and build it directly (not
  # only via docker) so a TS/test/build break is caught with clear output.
  console:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate
      - name: install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm exec tsc --noEmit
      - name: unit tests
        run: pnpm test
      - name: build
        run: pnpm build
      - name: build console image
        working-directory: .
        run: docker build -t sandboxd-console:ci ./console

  # Installer smoke test on BOTH Linux and real macOS (macos-latest is Apple
  # hardware). Docker can't run macOS, so this exercises install.sh's shell
  # logic with docker stubbed — catching BSD/GNU (sed, mktemp), bash-3.2, and
  # the Darwin data-dir portability issues on the actual OS.
  install:
    name: install-smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: parse install.sh
        run: bash -n install.sh
      - name: install.sh platform logic (docker stubbed)
        run: bash scripts/test-install.sh
