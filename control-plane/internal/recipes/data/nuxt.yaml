id: nuxt
display_name: Nuxt 3
detect:
  deps: [nuxt]
  config_files: [nuxt.config.js, nuxt.config.ts]
suggested_manifest: |
  version: 1
  web:
    command: "[ -x node_modules/.bin/nuxt ] || pnpm install; pnpm exec nuxt dev --host 0.0.0.0 --port 3000"
    port: 3000
    health_path: "/"
config_snippets:
  - file: "nuxt.config.*"
    note: "If a newer Nuxt/Vite 403s the preview, add vite.server.allowedHosts: true."
verified:
  starter: nuxt/starter @ v3
  version: v0.4.9
