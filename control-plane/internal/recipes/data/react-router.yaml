id: react-router
display_name: React Router v7+ (framework mode, Remix successor)
detect:
  deps: ["@react-router/dev"]
suggested_manifest: |
  version: 1
  web:
    command: "[ -x node_modules/.bin/react-router ] || pnpm install; exec pnpm exec react-router dev --host 0.0.0.0 --port 3000"
    port: 3000
    health_path: "/"
config_snippets:
  - file: "vite.config.ts"
    note: "React Router framework mode is Vite — set server.allowedHosts: true in vite.config.ts (403 without it)."
notes:
  - "SSR loader/action verified (fresh per-request server data; action mutations revalidate)."
  - "Production is build-then-serve: `react-router build` → `react-router-serve ./build/server/index.js` (a Node SSR server, NOT static). This recipe is the dev runtime."
tags: [ssr, meta_framework, needs_config_snippet]
verified:
  starter: "create-react-router (RR v7/v8 framework mode)"
  version: v0.4.9
