id: sveltekit
display_name: SvelteKit
detect:
  deps: ["@sveltejs/kit"]
suggested_manifest: |
  version: 1
  web:
    command: "[ -x node_modules/.bin/vite ] || pnpm install; pnpm exec vite dev --host 0.0.0.0 --port 3000"
    port: 3000
    health_path: "/"
config_snippets:
  - file: "vite.config.*"
    note: "Add server.allowedHosts: true (SvelteKit dev is Vite — needed even on Vite 4.5.x)."
verified:
  starter: mandrasch/sveltekit-demo-app
  version: v0.4.9
