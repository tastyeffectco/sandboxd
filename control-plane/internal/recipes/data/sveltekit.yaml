id: sveltekit
display_name: SvelteKit
detect:
  deps: ["@sveltejs/kit"]
suggested_manifest: |
  version: 1
  web:
    command: "[ -x node_modules/.bin/vite ] || pnpm install; pnpm exec vite dev --host 0.0.0.0 --port 3000"
    port: 3000
    health_path: "/"
config_snippets:
  - file: "vite.config.*"
    note: "Add server.allowedHosts: true (SvelteKit dev is Vite — needed even on Vite 4.5.x)."
notes:
  - "Dev recipe handles SSR `+page.server.ts` load + form actions (verified) — no adapter-node build needed for dev."
  - "Svelte 5 minimal projects may have config only in vite.config.ts (no svelte.config.js)."
  - "If the app uses Node 22 `node:sqlite`, it needs NODE_OPTIONS=--experimental-sqlite (add it to web.command, e.g. `NODE_OPTIONS=--experimental-sqlite pnpm exec vite dev ...`)."
verified:
  starter: mandrasch/sveltekit-demo-app
  version: v0.4.9
