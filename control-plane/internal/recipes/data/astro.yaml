id: astro
display_name: Astro
detect:
  deps: [astro]
  config_files: [astro.config.mjs, astro.config.js, astro.config.ts]
suggested_manifest: |
  version: 1
  web:
    command: "[ -x node_modules/.bin/astro ] || pnpm install; pnpm exec astro dev --host 0.0.0.0 --port 3000"
    port: 3000
    health_path: "/"
config_snippets:
  - file: "astro.config.mjs"
    note: "Add vite.server.allowedHosts: true in astro.config.mjs — allowedHosts belongs in config, NOT a CLI flag."
notes:
  - "Astro's dev server defaults to port 4321; this manifest pins 3000."
verified:
  starter: astro blog starter
  version: v0.4.9
