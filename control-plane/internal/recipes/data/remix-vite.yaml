id: remix-vite
display_name: Remix v2 (Vite)
detect:
  deps: ["@remix-run/dev"]
suggested_manifest: |
  version: 1
  web:
    command: "[ -x node_modules/.bin/remix ] || pnpm install; pnpm exec remix vite:dev --host --port 3000"
    port: 3000
    health_path: "/"
config_snippets:
  - file: "vite.config.ts"
    note: "Add server.allowedHosts: true (Remix v2 dev is Vite)."
notes:
  - "React Router v7: swap the command for `pnpm exec react-router dev --host --port 3000`."
verified:
  starter: EvanMarie/remix-vite-tailwind-minimal-template
  version: v0.4.9
