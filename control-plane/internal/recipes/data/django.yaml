id: django
display_name: Django (Python)
detect:
  config_files: [manage.py]
  requirements_contains: [django]
suggested_manifest: |
  version: 1
  web:
    command: "[ -d .venv ] || (uv venv && uv pip install -r requirements.txt); .venv/bin/python manage.py migrate; exec .venv/bin/python manage.py runserver 0.0.0.0:3000"
    port: 3000
    health_path: "/"
config_snippets:
  - file: "settings.py"
    note: "Django rejects unknown hosts (HTTP 400 DisallowedHost). Set ALLOWED_HOSTS = ['*'] (or your preview host) in settings.py."
tags: [needs_config_snippet, sqlite_app]
verified:
  starter: django-ve/django-helloworld
  version: v0.4.9
