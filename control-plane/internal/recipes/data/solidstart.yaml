id: solidstart
display_name: SolidStart (Vinxi/Vite)
detect:
  deps: ["@solidjs/start"]
  config_files: [app.config.ts]
suggested_manifest: |
  version: 1
  web:
    command: "[ -x node_modules/.bin/vinxi ] || pnpm install; exec pnpm exec vinxi dev --host --port 3000"
    port: 3000
    health_path: "/"
config_snippets:
  - file: "app.config.ts"
    note: "SolidStart dev is Vite — set vite.server.allowedHosts: true in app.config.ts (403 without it)."
tags: [needs_config_snippet]
verified:
  starter: kuroyuki/solidstart-starter
  version: v0.4.9
